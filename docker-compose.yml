# ─── Infrastructure KafkaLearn ─────────────────────────────────
# Uniquement les services externes. L'app tourne en local.
#
# Usage :
#   docker compose up -d          # démarre tout
#   docker compose down           # arrête tout
#   docker compose up redis db -d # juste Redis + Postgres

services:
  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kafkalearn_redis
    restart: always
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data

  # ─── PostgreSQL + pgvector ───────────────────────────────────
  db:
    image: ankane/pgvector:latest
    container_name: kafkalearn_postgres
    restart: always
    environment:
      POSTGRES_DB: kafkalearn_db
      POSTGRES_USER: kafkalearn_user
      POSTGRES_PASSWORD: kafkalearn_password
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ─── Vespa (Moteur vectoriel) ────────────────────────────────
  vespa:
    image: vespaengine/vespa:latest
    container_name: kafkalearn_vespa
    mem_limit: 1g
    environment:
      VESPA_CONFIGSERVER_JVMARGS: "-Xms256m -Xmx512m"
      VESPA_CONTAINER_JVMARGS: "-Xms256m -Xmx512m"
      VESPA_IGNORE_NOT_ENOUGH_MEMORY: "true"
    restart: always
    ports:
      - "18081:8080"
      - "19072:19071"
      - "19093:19092"
    volumes:
      - vespadata:/opt/vespa/var

  # ─── MeiliSearch (Recherche textuelle) ───────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: kafkalearn_meilisearch
    restart: always
    environment:
      - MEILI_MASTER_KEY=kafkalearn_master_key
    ports:
      - "17700:7700"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  vespadata:
  meilidata:
  redisdata:
